services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: beauty_product_verifier
      POSTGRES_USER: bpv
      POSTGRES_PASSWORD: bpv
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      BPV_DATABASE_URL: postgresql+psycopg://bpv:bpv@postgres:5432/beauty_product_verifier
      BPV_CORS_ORIGINS: http://127.0.0.1:5173,http://localhost:5173
      BPV_STORAGE_DIR: /app/storage
      BPV_AUTO_CREATE_TABLES: "false"
      BPV_BOOTSTRAP_DEMO_DATA: "false"
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    volumes:
      - backend-storage:/app/storage

volumes:
  postgres-data:
  backend-storage:
