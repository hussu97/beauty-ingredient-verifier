name: Backend Deploy

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - "deploy/**"
      - "docker-compose.prod.yml"
      - ".github/workflows/backend-deploy.yml"

permissions:
  contents: read
  packages: write

jobs:
  test-build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run backend tests
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,data]"
          python -m pytest tests -v

      - name: Set image name
        run: |
          repo="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          echo "BPV_API_IMAGE=ghcr.io/${repo}/api:${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || github.token }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: ${{ env.BPV_API_IMAGE }}

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.GCP_VM_SSH_KEY }}" > ~/.ssh/bpv_deploy_key
          chmod 600 ~/.ssh/bpv_deploy_key
          ssh-keyscan -H "${{ secrets.GCP_VM_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy deployment files
        run: |
          ssh -i ~/.ssh/bpv_deploy_key "${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_HOST }}" "mkdir -p /opt/bpv/deploy"
          scp -i ~/.ssh/bpv_deploy_key docker-compose.prod.yml "${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_HOST }}:/opt/bpv/docker-compose.prod.yml"
          scp -i ~/.ssh/bpv_deploy_key deploy/Caddyfile "${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_HOST }}:/opt/bpv/deploy/Caddyfile"

      - name: Write VM environment
        run: |
          ssh -i ~/.ssh/bpv_deploy_key "${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_HOST }}" "cat > /opt/bpv/.env" <<'EOF'
          BPV_API_IMAGE=${{ env.BPV_API_IMAGE }}
          BPV_ENV=production
          BPV_DATABASE_URL=${{ secrets.BPV_DATABASE_URL }}
          BPV_POSTGRES_DB=${{ secrets.BPV_POSTGRES_DB }}
          BPV_POSTGRES_USER=${{ secrets.BPV_POSTGRES_USER }}
          BPV_POSTGRES_PASSWORD=${{ secrets.BPV_POSTGRES_PASSWORD }}
          BPV_POSTGRES_DATA_DIR=${{ secrets.BPV_POSTGRES_DATA_DIR }}
          BPV_CORS_ORIGINS=${{ secrets.BPV_CORS_ORIGINS }}
          BPV_STORAGE_DIR=/app/storage
          BPV_AUTO_CREATE_TABLES=false
          BPV_BOOTSTRAP_DEMO_DATA=false
          BPV_OPEN_BEAUTY_FACTS_USER_AGENT=${{ secrets.BPV_OPEN_BEAUTY_FACTS_USER_AGENT }}
          BPV_ENABLE_LIVE_OPEN_BEAUTY_FACTS_LOOKUP=true
          BPV_ENABLE_OPTIONAL_ML=true
          BPV_ENABLE_SQLITE_VEC=false
          BPV_OCR_LANGUAGE=en
          BPV_IMAGE_EMBEDDING_MODEL=sentence-transformers/clip-ViT-B-32
          BPV_IMAGE_DOWNLOAD_TIMEOUT_SECONDS=20
          BPV_EWG_ATTRIBUTION_TEXT=Contains information from EWG Skin Deep.
          BPV_EWG_USER_AGENT=${{ secrets.BPV_EWG_USER_AGENT }}
          API_DOMAIN=${{ secrets.API_DOMAIN }}
          ACME_EMAIL=${{ secrets.ACME_EMAIL }}
          EOF

      - name: Migrate and restart services
        run: |
          ssh -i ~/.ssh/bpv_deploy_key "${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_HOST }}" <<'EOF'
          set -euo pipefail
          cd /opt/bpv
          printf '%s\n' "${{ secrets.GHCR_TOKEN || github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker compose --env-file .env -f docker-compose.prod.yml pull api
          docker compose --env-file .env -f docker-compose.prod.yml run --rm api alembic upgrade head
          docker compose --env-file .env -f docker-compose.prod.yml up -d
          curl -fsS http://127.0.0.1:8000/api/v1/health
          EOF
